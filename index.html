<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal 21K | Gestión de Contenido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyACfn6C6_XqLDQI29f6uHUUwlCQkSCXNYk",
            authDomain: "costos-comunicacion-digital.firebaseapp.com",
            databaseURL: "https://costos-comunicacion-digital-default-rtdb.firebaseio.com",
            projectId: "costos-comunicacion-digital",
            storageBucket: "costos-comunicacion-digital.firebasestorage.app",
            messagingSenderId: "299496606379",
            appId: "1:299496606379:web:a4d6609ff79eebff0c85ee",
            measurementId: "G-D7GGDWSWKY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'esquipulas-21k-v1';

        const COLORS = { yellow: '#FFC107', celeste: '#00AEEF', navy: '#0a192f' };

        // --- ESTADO GLOBAL ---
        window.appState = {
            reports: [],
            currentView: 'list',
            editingReportId: null,
            aiLoading: false,
            aiChat: [],
            lastAnalyzedImage: null
        };

        const render = () => {
            const root = document.getElementById('root');
            if (!root) return;
            const view = window.appState.currentView;
            
            if (view === 'list') root.innerHTML = ListView();
            else if (view === 'create') root.innerHTML = CreateView();
            else if (view === 'compare') root.innerHTML = CompareView();
        };

        const ListView = () => `
            <div class="min-h-screen bg-slate-50 font-['Montserrat']">
                <nav class="bg-[#0a192f] text-white p-6 shadow-xl">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="logo 21k vii.png" alt="Logo 21K" class="h-12 w-12 rounded-full object-cover border-2 border-[#FFC107]">
                            <h1 class="font-black text-2xl uppercase tracking-tighter">Esquipulas 21K</h1>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="changeView('compare')" class="bg-white/10 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:bg-white/20 transition-all"><i class="fa-solid fa-chart-pie mr-2"></i>Comparativa</button>
                            <button onclick="changeView('create')" class="bg-[#FFC107] text-[#0a192f] px-4 py-2 rounded-xl text-xs font-bold uppercase shadow-lg hover:scale-105 transition-all"><i class="fa-solid fa-plus mr-2"></i>Nuevo Post</button>
                        </div>
                    </div>
                </nav>
                <main class="max-w-7xl mx-auto p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${window.appState.reports.map(r => `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm hover:shadow-xl transition-all cursor-pointer border border-gray-100 group relative">
                            <div class="flex justify-between mb-4">
                                <div class="w-12 h-12 rounded-2xl bg-sky-50 flex items-center justify-center text-sky-500 text-lg"><i class="fa-solid fa-medal"></i></div>
                                <button onclick="deleteReport('${r.id}')" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </div>
                            <h4 class="font-black text-lg mb-1" style="color: ${COLORS.navy}">${r.title}</h4>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${new Date(r.date).toLocaleDateString()}</p>
                            <div class="grid grid-cols-2 gap-4 mt-6">
                                <div class="bg-gray-50 p-3 rounded-xl"><p class="text-[9px] uppercase text-gray-400">Alcance</p><p class="font-black text-sky-600">${r.reach.toLocaleString()}</p></div>
                                <div class="bg-gray-50 p-3 rounded-xl"><p class="text-[9px] uppercase text-gray-400">Interacciones</p><p class="font-black text-amber-500">${r.interactions.toLocaleString()}</p></div>
                            </div>
                        </div>
                    `).join('')}
                </main>
            </div>
        `;

        const CompareView = () => {
            const total = window.appState.reports.reduce((acc, r) => ({
                reach: acc.reach + (r.reach || 0),
                results: acc.results + (r.results || 0),
                interactions: acc.interactions + (r.interactions || 0)
            }), { reach: 0, results: 0, interactions: 0 });

            return `
                <div class="min-h-screen bg-slate-50 p-8 font-['Montserrat']">
                    <button onclick="changeView('list')" class="mb-8 font-bold"><i class="fa-solid fa-arrow-left mr-2"></i> Volver</button>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="bg-white p-8 rounded-3xl shadow-lg border-b-8 border-[#00AEEF]">
                            <p class="text-xs uppercase text-gray-400 font-black">Alcance Total</p>
                            <h3 class="text-4xl font-black">${total.reach.toLocaleString()}</h3>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-lg border-b-8 border-[#FFC107]">
                            <p class="text-xs uppercase text-gray-400 font-black">Interacciones Totales</p>
                            <h3 class="text-4xl font-black">${total.interactions.toLocaleString()}</h3>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-lg border-b-8 border-[#00853f]">
                            <p class="text-xs uppercase text-gray-400 font-black">Postulantes/Nuevos Seguidores</p>
                            <h3 class="text-4xl font-black">${total.results.toLocaleString()}</h3>
                        </div>
                    </div>
                </div>
            `;
        };

        const CreateView = () => `
            <div class="min-h-screen bg-slate-50 p-8">
                <div class="max-w-4xl mx-auto bg-white p-10 rounded-[3rem] shadow-2xl">
                    <h2 class="text-2xl font-black mb-8">Ingreso de Datos</h2>
                    <form id="createForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="rep_title" placeholder="Título del Post" class="p-4 rounded-2xl bg-gray-50 outline-none">
                        <input type="date" id="rep_date" class="p-4 rounded-2xl bg-gray-50 outline-none">
                        <input type="number" id="rep_reach" placeholder="Alcance" class="p-4 rounded-2xl bg-gray-50 outline-none">
                        <input type="number" id="rep_res" placeholder="Resultados/Seguidores" class="p-4 rounded-2xl bg-gray-50 outline-none">
                        <input type="number" id="rep_react" placeholder="Reacciones" class="p-4 rounded-2xl bg-gray-50 outline-none">
                        <input type="number" id="rep_comm" placeholder="Comentarios" class="p-4 rounded-2xl bg-gray-50 outline-none">
                        <input type="number" id="rep_share" placeholder="Compartidos" class="p-4 rounded-2xl bg-gray-50 outline-none">
                        <button type="submit" class="col-span-full py-5 bg-[#0a192f] text-white font-black rounded-2xl">GUARDAR</button>
                    </form>
                </div>
            </div>
        `;

        function setupEventListeners() {
            document.getElementById('createForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    title: document.getElementById('rep_title').value,
                    date: document.getElementById('rep_date').value,
                    reach: Number(document.getElementById('rep_reach').value),
                    results: Number(document.getElementById('rep_res').value),
                    interactions: Number(document.getElementById('rep_react').value) + Number(document.getElementById('rep_comm').value) + Number(document.getElementById('rep_share').value),
                    createdAt: new Date().toISOString()
                };
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), data);
                window.appState.currentView = 'list';
                render();
            });
        }
        
        window.changeView = (v) => { window.appState.currentView = v; render(); };
        window.deleteReport = async (id) => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id)); };
        
        // --- INICIALIZACIÓN ---
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reports')), (snap) => {
                    window.appState.reports = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                });
            } else {
                await signInAnonymously(auth);
            }
        });
        render();
    </script>
</head>
<body><div id="root"></div></body>
</html>
